<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La Isla Network — Tools</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%}
    .wrap{
      background:#0a1b30;
      width:100%;
      height:100vh;
      overflow:hidden;
      position:relative;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .wrap::after{
      content:'';
      width:100%;height:100%;
      background:
        repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(255,255,255,0.012) 3px,rgba(255,255,255,0.012) 4px),
        repeating-linear-gradient(90deg,transparent,transparent 3px,rgba(255,255,255,0.012) 3px,rgba(255,255,255,0.012) 4px);
      position:absolute;
      top:0;left:0;
      pointer-events:none;
      z-index:2;
    }
    .blobs{
      width:55vh;height:55vh;
      display:block;
      position:absolute;
      top:50%;left:50%;
      transform:translate(-50%,-50%);
    }
    .blob{
      width:100%;height:100%;
      border-radius:100%;
      position:absolute;
      mix-blend-mode:screen;
      filter:blur(70px);
    }
.blob.a{background:#6399af;animation:c2 12s linear infinite;}
.blob.b{background:#85b0c3;animation:c1 28s linear infinite;}
.blob.c{background:#a8c8d6;animation:c1 10s linear infinite reverse;}
.blob.d{background:#4d7d93;animation:c2 14s linear infinite reverse;}
.blob.e{background:#0d3352;animation:c1 18s linear infinite;}
    @keyframes c1{
      0%{transform:translate(0,-140px)}
      25%{transform:translate(140px,0)}
      50%{transform:translate(0,140px)}
      75%{transform:translate(-140px,0)}
      100%{transform:translate(0,-140px)}
    }
    @keyframes c2{
      0%{transform:translate(0,140px)}
      25%{transform:translate(-140px,0)}
      50%{transform:translate(0,-140px)}
      75%{transform:translate(140px,0)}
      100%{transform:translate(0,140px)}
    }
    .logo{
      position:relative;
      filter: brightness(0) invert(1);
      z-index:3;
      width:clamp(160px,22vw,280px);
      opacity:0;
      animation:fadeIn 1.4s ease 0.6s forwards;
    }
    @keyframes fadeIn{to{opacity:1}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="blobs">
      <div class="blob a"></div>
      <div class="blob b"></div>
      <div class="blob c"></div>
      <div class="blob d"></div>
      <div class="blob e"></div>
    </div>
    <a href="https://laislanetwork.org/">
    <img class="logo" src="https://laislanetwork.org/wp-content/uploads/2023/08/LaIslaNetwork_Logo_PMS.svg" alt="La Isla Network">
    </a>  
  </div>
</body>
</html>
